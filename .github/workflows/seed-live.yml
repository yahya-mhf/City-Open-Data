name: Seed Live Data

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - name: Call internal seed-latest endpoint
        run: |
          curl -s -X POST "${{ vars.API_URL }}/internal/seed-latest" \
            -H "INTERNAL_SECRET: ${{ secrets.INTERNAL_SECRET }}" \
            -H "Content-Type: application/json" \
            --fail-with-body
