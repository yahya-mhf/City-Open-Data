x-shared-env: &shared-env
  DATABASE_URL: postgresql+asyncpg://sc_user:sc_password@timescaledb:5432/smart_city
  REDIS_URL: redis://redis:6379/0
  RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
  MINIO_ENDPOINT: minio:9000
  MINIO_ACCESS_KEY: sc_access_key
  MINIO_SECRET_KEY: sc_secret_key
  MINIO_BUCKET: smart-city
  JWT_SECRET: super-secret-key-change-in-production
  JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  JWT_REFRESH_TOKEN_EXPIRE_DAYS: "7"
  CORS_ORIGINS: http://localhost:3000,http://localhost
  ENVIRONMENT: development
  LOG_LEVEL: INFO
  GROQ_API_KEY: ${GROQ_API_KEY}
  INTERNAL_SECRET: ${INTERNAL_SECRET:-change-me-in-production}

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: sc_user
      POSTGRES_PASSWORD: sc_password
      POSTGRES_DB: smart_city
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sc_user -d smart_city"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  minio:
    image: minio/minio
    environment:
      MINIO_ROOT_USER: sc_access_key
      MINIO_ROOT_PASSWORD: sc_secret_key
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      <<: *shared-env
    command: ["sh", "-c", "pip install -q openai watchfiles || true && poetry run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/apps/api --reload-dir /app/packages"]
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages/shared:/app/packages/shared
      - ./packages/database:/app/packages/database
      - ./packages/auth:/app/packages/auth
      - ./packages/observability:/app/packages/observability
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      <<: *shared-env
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  simulator:
    build:
      context: .
      dockerfile: apps/simulator/Dockerfile
    environment:
      <<: *shared-env
      SIMULATOR_INTERVAL_SECONDS: "5"
      SIMULATOR_SENSOR_COUNT: "20"
      SIMULATOR_BATCH_SIZE: "10"
      SIMULATOR_REALISTIC_TIME: "true"
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('rabbitmq', 5672), timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws
      API_INTERNAL_URL: http://api:8000/api/v1
    depends_on:
      - api

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api
      - web

volumes:
  timescaledb_data:
  minio_data:
  prometheus_data:
  grafana_data:
  rabbitmq_data:
